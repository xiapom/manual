                            <button class="btn btn-primary" onclick="openQuestModal()">+ Nova Missão</button>
                        ` : ''}
                    </div>
                </div>
                
                <div class="grid grid-2">
                    ${quests.map(q => renderQuestCard(q)).join('')}
                </div>
                
                ${quests.length === 0 ? `
                    <div class="empty-state">
                        <div class="empty-icon">📜</div>
                        <div class="empty-title">Nenhuma missão</div>
                    </div>
                ` : ''}
            `;
        }

        function renderQuestCard(quest) {
            const progress = quest.checklist.filter(i => i.done).length;
            const total = quest.checklist.length;
            const percent = total > 0 ? Math.round((progress / total) * 100) : 0;
            
            const statusColors = {
                'Ativa': 'tag-accent',
                'Disponível': '',
                'Completa': 'tag-accent',
                'Falha': ''
            };
            
            return `
                <div class="card" onclick="openQuestDetail('${quest.id}')" style="cursor: pointer;">
                    <div class="card-header">
                        <div>
                            <div style="font-weight: 600; font-size: var(--text-lg);">${quest.title}</div>
                            <div class="text-muted" style="font-size: var(--text-sm);">${quest.linkedNpc || 'Sem NPC vinculado'}</div>
                        </div>
                        <span class="tag ${statusColors[quest.status]}">${quest.status}</span>
                    </div>
                    <div class="card-body">
                        <p>${truncate(quest.description, 120)}</p>
                        <div style="margin-top: var(--space-md);">
                            <div style="display: flex; justify-content: space-between; font-size: var(--text-sm); margin-bottom: var(--space-xs);">
                                <span>Progresso</span>
                                <span>${progress}/${total}</span>
                            </div>
                            <div style="height: 6px; background: var(--bg-tertiary); border-radius: var(--radius-full); overflow: hidden;">
                                <div style="width: ${percent}%; height: 100%; background: var(--accent); transition: width var(--transition-normal);"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function openQuestDetail(id) {
            const quest = await dbGet('quests', id);
            if (!quest) return;
            
            const canEdit = !isReadOnly && currentUser.role === 'master';
            
            const content = `
                <div class="modal-header">
                    <h3 class="modal-title">${quest.title}</h3>

                        ${canEdit ? `<button class="btn btn-secondary" onclick="editQuest('${id}')">Editar</button>` : ''}

                    </div>
                </div>
                <div class="modal-body">
                    <div style="margin-bottom: var(--space-md);">
                        <span class="tag ${quest.status === 'Ativa' ? 'tag-accent' : ''}">${quest.status}</span>

                    <div class="md-preview" style="margin-bottom: var(--space-lg);">${parseMarkdown(quest.description)}</div>

                            <div class="checklist-item ${item.done ? 'completed' : ''}" ${canEdit ? `onclick="toggleQuestChecklist('${id}', ${i})"` : ''}>

                            </div>
                        `).join('')}

                    <h4>Recompensas</h4>

                </div>

            openModal(content, 'modal-lg');

        async function toggleQuestChecklist(id, index) {
            const quest = await dbGet('quests', id);

            quest.checklist[index].done = !quest.checklist[index].done;
            await dbPut('quests', quest);
            
            openQuestDetail(id);

        function setupMapInteractions() {
            const viewport = document.getElementById('map-viewport');
            const image = document.getElementById('map-image');
            if (!viewport || !image) return;
            
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                zoomMap(delta);
            });
            
            viewport.addEventListener('mousedown', (e) => {
                if (e.target === image) {
                    mapState.isDragging = true;
                    mapState.lastX = e.clientX;
                    mapState.lastY = e.clientY;
                }
            });
            
            document.addEventListener('mousemove', (e) => {
                if (mapState.isDragging) {
                    const dx = e.clientX - mapState.lastX;
                    const dy = e.clientY - mapState.lastY;
                    mapState.panX += dx;
                    mapState.panY += dy;
                    mapState.lastX = e.clientX;
                    mapState.lastY = e.clientY;
                    updateMapTransform();
                }
            });
            
            document.addEventListener('mouseup', () => {
                mapState.isDragging = false;
            });
        }

        function zoomMap(delta) {
            mapState.zoom = Math.max(0.5, Math.min(3, mapState.zoom + delta));
            updateMapTransform();
        }

        function resetMap() {
            mapState.zoom = 1;
            mapState.panX = 0;
            mapState.panY = 0;
            updateMapTransform();
        }

        function updateMapTransform() {
            const image = document.getElementById('map-image');
            if (image) {
                image.style.transform = `translate(${mapState.panX}px, ${mapState.panY}px) scale(${mapState.zoom})`;
            }
        }

        async function handleMapUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 4 * 1024 * 1024) {
                showToast('Imagem muito grande. Máximo 4MB.', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const mapData = await dbGetAll('map');
                const map = mapData[0] || { id: generateId(), pins: [] };
                map.image = e.target.result;
                await dbPut('map', map);
                renderMap();
                showToast('Mapa carregado!', 'success');
            };
            reader.readAsDataURL(file);
        }

                            `).join('') : '<p class="text-muted">Nenhuma rolagem ainda</p>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function quickRoll() {
            navigateTo('dice');
        }

        function rollDice(count, sides) {
            const rolls = [];
            for (let i = 0; i < count; i++) {
                rolls.push(Math.floor(Math.random() * sides) + 1);
            }
            const total = rolls.reduce((a, b) => a + b, 0);
            
            displayRollResult(`${count}d${sides}`, rolls, total);
            saveRoll(`${count}d${sides}`, rolls, total);
        }

        function rollFormula() {
            const formula = document.getElementById('dice-formula').value.trim();
            if (!formula) return;
            
            // Parse formula like "2d6+3" or "1d20+FOR"
            const match = formula.match(/(\d+)?d(\d+)([+-]\d+)?/i);
            if (!match) {
                showToast('Fórmula inválida', 'error');
                return;
            }
            
            const count = parseInt(match[1]) || 1;
            const sides = parseInt(match[2]);
            const modifier = match[3] ? parseInt(match[3]) : 0;
            
            const rolls = [];
            for (let i = 0; i < count; i++) {
                rolls.push(Math.floor(Math.random() * sides) + 1);
            }
            const total = rolls.reduce((a, b) => a + b, 0) + modifier;
            
            displayRollResult(formula, rolls, total, modifier);
            saveRoll(formula, rolls, total);
        }

        function displayRollResult(formula, rolls, total, modifier = 0) {
            const area = document.getElementById('roll-result-area');
            if (!area) return;
            
            const modStr = modifier > 0 ? `+${modifier}` : modifier < 0 ? modifier : '';
            
            area.innerHTML = `
                <div class="roll-result animate-fadeIn">
                    <div style="font-size: var(--text-sm); color: var(--text-muted); margin-bottom: var(--space-sm);">
                        ${formula} ${modStr}
                    </div>
                    <div class="roll-total">${total}</div>
                    <div class="roll-details">
                        Dados: ${rolls.join(', ')} ${modStr}
                    </div>
                </div>
            `;
        }

        async function saveRoll(formula, rolls, total) {
            const roll = {
                id: generateId(),
                roller: currentUser.name,
                formula,
                rolls,
                total,
                timestamp: Date.now(),
                public: currentUser.role === 'master' ? false : true
            };
            
            await dbPut('rolls', roll);
            addToFeed(`rolou ${formula} = ${total}`, 'roll');
        }

        // ============================================
        // FEED MODULE
        // ============================================
        async function renderFeed() {
            const content = document.getElementById('content');
            const feed = await dbGetAll('feed');
            feed.sort((a, b) => b.timestamp - a.timestamp);
            
            content.innerHTML = `
                <div class="page-header">
                    <h1 class="page-title">
                        <span class="page-title-icon">💬</span>
                        Feed
                    </h1>
                </div>
                
                <div class="feed-container">
                    <div class="feed-messages" id="feed-messages">
                        ${feed.length > 0 ? feed.map(m => renderFeedMessage(m)).join('') : '<p class="text-muted text-center" style="padding: var(--space-xl);">Nenhuma mensagem ainda</p>'}
                    </div>
                    
                    ${!isReadOnly ? `
                        <div class="feed-input-area">
                            <input type="text" class="form-input feed-input" id="feed-input" placeholder="Escreva uma mensagem..." onkeypress="if(event.key==='Enter')postFeed()">
                            <button class="btn btn-primary" onclick="postFeed()">Enviar</button>
                        </div>
                    ` : ''}
                </div>
            `;
            
            // Scroll to bottom
            const messages = document.getElementById('feed-messages');
            if (messages) messages.scrollTop = messages.scrollHeight;
        }

        function renderFeedMessage(message) {
            const isRoll = message.type === 'roll';
            
            return `
                <div class="feed-message">
                    <div class="feed-avatar" style="background: ${message.userRole === 'master' ? 'var(--accent)' : 'var(--info)'}">
                        ${message.userName.charAt(0).toUpperCase()}
                    </div>
                    <div class="feed-content">
                        <div class="feed-header">
                            <span class="feed-author">${message.userName}</span>
                            <span class="feed-time">${formatDateTime(message.timestamp)}</span>
                        </div>
                        ${isRoll ? `
                            <div class="feed-roll">
                                <span>🎲 ${message.text}</span>
                            </div>
                        ` : `
                            <div class="feed-text">${escapeHtml(message.text)}</div>
                        `}
                    </div>
                </div>
            `;
        }

        async function postFeed() {
            if (feedCooldown) {
                showToast('Aguarde 3 segundos entre mensagens', 'warning');
                return;
            }
            
            const input = document.getElementById('feed-input');
            const text = input.value.trim();
            if (!text) return;
            
            feedCooldown = true;
            setTimeout(() => feedCooldown = false, 3000);
            
            await addToFeed(text, 'message');
            input.value = '';
            renderFeed();
        }

        async function addToFeed(text, type = 'message') {
            const feed = {
                id: generateId(),
                userName: currentUser.name,
                userRole: currentUser.role,
                text,
                type,
                timestamp: Date.now()
            };
            
            await dbPut('feed', feed);
        }

                    ${currentUser.role === 'master' ? `

                            </div>
                        </div>

                            <div class="card-header">
                                <h3 class="card-title">SeguranÃ§a do Mestre</h3>
                            </div>
                            <div class="card-body">
                                <div class="form-group">
                                    <label class="form-label">Senha Atual</label>
                                    <input type="password" class="form-input" id="current-master-password" placeholder="Digite a senha atual">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Nova Senha</label>
                                    <input type="password" class="form-input" id="new-master-password" placeholder="Digite a nova senha">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Confirmar Nova Senha</label>
                                    <input type="password" class="form-input" id="confirm-master-password" placeholder="Confirme a nova senha">
                                </div>
                                <button class="btn btn-primary" onclick="changeOwnMasterPassword()">Alterar Minha Senha</button>
                            </div>
                        </div>
                        
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Gerenciamento de Jogadores</h3>
                            </div>
                            <div class="card-body">
                                <button class="btn btn-primary" onclick="openPlayerModal()">+ Adicionar Jogador</button>
                                <div id="players-list" style="margin-top: var(--space-md);"></div>
                            </div>
                        </div>
                        
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Backup e Restauração</h3>
                            </div>
                            <div class="card-body">
                                <div style="display: flex; gap: var(--space-sm); flex-wrap: wrap;">
                                    <button class="btn btn-secondary" onclick="exportData()">Exportar Dados</button>
                                    <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Importar Dados</button>
                                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
                                </div>
                                <p class="form-hint" style="margin-top: var(--space-sm);">Exporte todos os dados para backup ou importe de um arquivo JSON.</p>

                                <h3 class="card-title">Zona de Perigo</h3>

        async function saveAttributeTemplate() {
            const template = document.getElementById('attr-template').value.split(',').map(s => s.trim()).filter(s => s);
            
            const campaign = await dbGetAll('campaign');
            const settings = campaign[0] || { id: 'main' };
            settings.attributeTemplate = template;
            
            await dbPut('campaign', settings);
            showToast('Template salvo!', 'success');
        }

        async function renderPlayersList() {
            const users = await dbGetAll('users');
            const players = users.filter(u => u.role === 'player');
            
            const container = document.getElementById('players-list');
            if (!container) return;
            
            container.innerHTML = players.length > 0 ? `
                <table style="width: 100%;">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>PIN</th>
                            <th>Acesso de Mestre</th>
                            <th>Código</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${players.map(p => `
                            <tr>
                                <td>${p.name}</td>
                                <td>${p.pin}</td>
                                <td>${p.masterAccess ? 'Concedido' : 'Não'}</td>
                                <td><code>${p.inviteCode}</code></td>
                                <td>
                                    ${p.masterAccess ? `
                                        <button class="btn btn-secondary" onclick="changeGrantedMasterPassword('${p.id}')">Senha Mestre</button>
                                        <button class="btn btn-secondary" onclick="revokeMasterAccess('${p.id}')">Revogar Mestre</button>
                                    ` : `
                                        <button class="btn btn-secondary" onclick="grantMasterAccess('${p.id}')">Conceder Mestre</button>
                                    `}
                                    <button class="btn btn-danger" onclick="deletePlayer('${p.id}')">Remover</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p class="text-muted">Nenhum jogador cadastrado</p>';
        }

        async function openPlayerModal() {
            const content = `
                <div class="modal-header">
                    <h3 class="modal-title">Adicionar Jogador</h3>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-input" id="player-new-name" placeholder="Nome do jogador">
                    </div>
                    <div class="form-group">
                        <label class="form-label">PIN (4 dígitos)</label>
                        <input type="text" class="form-input" id="player-new-pin" placeholder="1234" maxlength="4">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button class="btn btn-primary" onclick="savePlayer()">Salvar</button>
                </div>
            `;
            openModal(content);
        }

        async function savePlayer() {
            const name = document.getElementById('player-new-name').value.trim();
            const pin = document.getElementById('player-new-pin').value.trim();
            const users = await dbGetAll('users');
            const duplicate = users.find(u => u.name.toLowerCase() === name.toLowerCase());
            
            if (!name || !pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
                showToast('Preencha nome e PIN de 4 dígitos', 'error');
                return;
            }
            
            if (duplicate) {
                showToast('Já existe um usuário com esse nome', 'error');
                return;
            }

            const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            await dbPut('users', {
                id: generateId(),
                name,
                role: 'player',
                pin,
                inviteCode,
                createdAt: Date.now()
            });
            
            closeModal();
            showToast(`Jogador adicionado! Código: ${inviteCode}`, 'success');
            renderPlayersList();
        }

        async function grantMasterAccess(id) {
            const user = await dbGet('users', id);
            if (!user) return;

            const password = prompt(`Defina a senha de mestre para ${user.name}:`);
            if (password === null) return;

            const confirm = prompt(`Confirme a senha de mestre para ${user.name}:`);
            if (confirm === null) return;

            if (!password || password !== confirm) {
                showToast('As senhas não coincidem', 'error');
                return;
            }

            user.masterAccess = true;
            user.masterPasswordHash = hashPassword(password);
            user.masterGrantedAt = Date.now();

            await dbPut('users', user);
            renderPlayersList();
            showToast(`${user.name} agora tem acesso de mestre`, 'success');
        }

        async function revokeMasterAccess(id) {
            const user = await dbGet('users', id);
            if (!user) return;
            if (!confirm(`Revogar acesso de mestre de ${user.name}?`)) return;

            delete user.masterAccess;
            delete user.masterPasswordHash;
            delete user.masterGrantedAt;

            await dbPut('users', user);
            renderPlayersList();
            showToast('Acesso de mestre revogado', 'success');
        }

        async function changeGrantedMasterPassword(id) {
            const user = await dbGet('users', id);
            if (!user) return;

            const password = prompt(`Nova senha de mestre para ${user.name}:`);
            if (password === null) return;

            const confirm = prompt(`Confirme a nova senha de mestre para ${user.name}:`);
            if (confirm === null) return;

            if (!password || password !== confirm) {
                showToast('As senhas não coincidem', 'error');
                return;
            }

            user.masterAccess = true;
            user.masterPasswordHash = hashPassword(password);

            await dbPut('users', user);
            showToast('Senha de mestre atualizada', 'success');
        }

        async function changeOwnMasterPassword() {
            if (!currentUser || currentUser.role !== 'master') return;

            const currentPassword = document.getElementById('current-master-password').value;
            const newPassword = document.getElementById('new-master-password').value;
            const confirmPassword = document.getElementById('confirm-master-password').value;

            if (!currentPassword || !newPassword || !confirmPassword) {
                showToast('Preencha todos os campos de senha', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('As novas senhas não coincidem', 'error');
                return;
            }

            const user = currentUser.id
                ? await dbGet('users', currentUser.id)
                : (await dbGetAll('users')).find(u => isMasterUser(u) && u.name === currentUser.name);
            if (!user) {
                showToast('Usuário mestre não encontrado', 'error');
                return;
            }

            if (getMasterPasswordHash(user) !== hashPassword(currentPassword)) {
                showToast('Senha atual incorreta', 'error');
                return;
            }

            if (user.role === 'master') {
                user.passwordHash = hashPassword(newPassword);
            } else {
                user.masterPasswordHash = hashPassword(newPassword);
            }

            await dbPut('users', user);

            document.getElementById('current-master-password').value = '';
            document.getElementById('new-master-password').value = '';
            document.getElementById('confirm-master-password').value = '';

            showToast('Senha alterada com sucesso', 'success');
        }

        async function deletePlayer(id) {
            if (!confirm('Remover este jogador?')) return;
            await dbDelete('users', id);
            renderPlayersList();
            showToast('Jogador removido', 'success');
        }

        // ============================================
        // BACKUP / EXPORT / IMPORT
        // ============================================
        async function exportData() {
            const stores = ['users', 'campaign', 'wiki_pages', 'characters', 'npcs', 'bestiary', 'quests', 'sessions', 'map', 'rolls', 'feed', 'items'];
            const data = {};
            
            for (const store of stores) {
                data[store] = await dbGetAll(store);
            }
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `eldryon_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Backup exportado!', 'success');
        }

        async function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    const mode = confirm('Clique OK para MESCLAR com dados existentes\nClique Cancelar para SUBSTITUIR todos os dados');
                    
                    if (!mode) {
                        // Replace - clear all first
                        if (!confirm('ISSO APAGARÁ TODOS OS DADOS ATUAIS. Continuar?')) return;
                    }
                    
                    for (const [store, items] of Object.entries(data)) {
                        if (Array.isArray(items)) {
                            if (!mode) {
                                // Replace mode - clear existing
                                const existing = await dbGetAll(store);
                                for (const item of existing) {
                                    await dbDelete(store, item.id);
                                }
                            }
                            for (const item of items) {
                                await dbPut(store, item);
                            }
                        }
                    }
                    
                    showToast('Dados importados com sucesso!', 'success');
                    renderSettings();
                } catch (err) {
                    showToast('Erro ao importar: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        async function resetAllData() {
            const confirm1 = prompt('Digite RESETAR para confirmar a exclusão de TODOS os dados:');
            if (confirm1 !== 'RESETAR') return;
            
            const confirm2 = prompt('Esta ação NÃO PODE SER DESFEITA. Digite RESETAR novamente:');
            if (confirm2 !== 'RESETAR') return;
            
            const stores = ['users', 'campaign', 'wiki_pages', 'characters', 'npcs', 'bestiary', 'quests', 'sessions', 'map', 'rolls', 'feed', 'items', 'comments', 'uploads'];
            
            for (const store of stores) {
                const items = await dbGetAll(store);
                for (const item of items) {
                    await dbDelete(store, item.id);
                }
            }
            
            // Keep only master user
            await dbPut('users', {
                id: generateId(),
                name: DEFAULT_MASTER_NAME,
                role: 'master',
                passwordHash: hashPassword(DEFAULT_MASTER_PASSWORD)
            });
            
            showToast('Todos os dados foram apagados', 'success');
            logout();
        }

        // ============================================
        // SEARCH
        // ============================================
        async function handleSearch(event) {
            if (event.key !== 'Enter') return;
            
            const query = event.target.value.trim().toLowerCase();
            if (!query) return;
            
            const results = [];
            
            // Search wiki
            const wiki = await dbGetAll('wiki_pages');
            wiki.filter(w => w.public || currentUser.role === 'master').forEach(w => {
                if (w.name.toLowerCase().includes(query) || w.content.toLowerCase().includes(query)) {
                    results.push({ type: 'Wiki', name: w.name, action: () => openWikiPage(w.name) });
                }
            });
            
            // Search NPCs
            const npcs = await dbGetAll('npcs');
            npcs.forEach(n => {
                if (n.name.toLowerCase().includes(query)) {
                    results.push({ type: 'NPC', name: n.name, action: () => openNPCDetail(n.id) });
                }
            });
            
            // Search characters
            const chars = await dbGetAll('characters');
            chars.forEach(c => {
                if (c.name.toLowerCase().includes(query)) {
                    results.push({ type: 'Personagem', name: c.name, action: () => openCharacterDetail(c.id) });
                }
            });
            
            // Show results
            if (results.length === 0) {
                showToast('Nenhum resultado encontrado', 'warning');
                return;
            }
            
            const content = `
                <div class="modal-header">
                    <h3 class="modal-title">Resultados da Busca: "${query}"</h3>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body">
                    ${results.slice(0, 20).map(r => `
                        <div class="checklist-item" onclick="closeModal(); ${r.action.toString().match(/\{([\s\S]*)\}/)[1].trim()}" style="margin-bottom: var(--space-sm);">
                            <span class="tag">${r.type}</span>
                            <span>${r.name}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            openModal(content);
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            loadThemeSettings();
            await initStorage();
            
            // Check for read-only mode
            const urlParams = new URLSearchParams(window.location.search);
            isReadOnly = urlParams.has('ro') || urlParams.has('readonly');
        });
    </script>
